name: Docker Build and Publish (Operator OS)

# Operator OS canary image — builds the operatoros branch and publishes ONLY the
# dedicated :operatoros tags. Deliberately separate from docker-publish.yml so a
# branch build can never advance :latest / :stable (the fleet's floating tags).
# Dispatch with:
#   gh workflow run docker-publish-operatoros.yml --ref feat/operatoros-mission-mode-v1

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-operatoros-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push-operatoros:
    if: github.repository == 'ashneil12/vanilla-hermes-agent'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          submodules: recursive
          fetch-depth: 1000

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Build image (amd64, smoke test)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          file: Dockerfile
          load: true
          platforms: linux/amd64
          tags: ghcr.io/ashneil12/vanilla-hermes-agent:operatoros-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test image starts
        run: |
          mkdir -p /tmp/hermes-test
          sudo chown -R 10000:10000 /tmp/hermes-test
          docker run --rm \
            -v /tmp/hermes-test:/opt/data \
            --entrypoint /opt/hermes/docker/entrypoint.sh \
            ghcr.io/ashneil12/vanilla-hermes-agent:operatoros-test --help

      - name: Test dashboard subcommand
        run: |
          mkdir -p /tmp/hermes-test
          sudo chown -R 10000:10000 /tmp/hermes-test
          docker run --rm \
            -v /tmp/hermes-test:/opt/data \
            --entrypoint /opt/hermes/docker/entrypoint.sh \
            ghcr.io/ashneil12/vanilla-hermes-agent:operatoros-test dashboard --help

      # Same regression gate as the prod workflow: media tool wiring must be
      # intact before the tag is published.
      - name: Media tool wiring regression gate
        run: |
          docker run --rm \
            --entrypoint sh \
            ghcr.io/ashneil12/vanilla-hermes-agent:operatoros-test \
            -lc 'cd /opt/hermes && /opt/hermes/.venv/bin/python3 -m pytest tests/tools/test_media_generation_wiring.py -q'

      # Operator OS gate: the mission-mode suite must pass inside the image.
      - name: Mission-mode regression gate
        run: |
          docker run --rm \
            --entrypoint sh \
            ghcr.io/ashneil12/vanilla-hermes-agent:operatoros-test \
            -lc 'cd /opt/hermes && /opt/hermes/.venv/bin/python3 -m pytest tests/agent/test_cost_budget.py tests/agent/test_mission.py tests/agent/test_escalation_router.py tests/agent/test_verification_gates.py tests/agent/test_planning_gate.py -q -o addopts=""'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Publish ONLY the dedicated Operator OS tags. Floating fleet tags
      # (:latest / :stable) are intentionally untouchable from this workflow.
      - name: Push :operatoros tags
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          file: Dockerfile
          push: true
          provenance: false
          platforms: linux/amd64
          tags: |
            ghcr.io/ashneil12/vanilla-hermes-agent:operatoros
            ghcr.io/ashneil12/vanilla-hermes-agent:operatoros-${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
