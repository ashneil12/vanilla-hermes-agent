name: Aeon — upstream sync (canary)

# Aeon keeps THIS canary agent fork current with NousResearch/hermes-agent.
# Nous iterates on the chat / webchat surface constantly, so this is meant to
# run often (every ~3h). It is the autonomous replacement for the manual
# `hermes-upstream-sync` SOP — for the common (clean) case. Anything that
# doesn't merge cleanly is handed BACK to a human, never guessed.
#
# SAFE BY DESIGN:
#   * Touches ONLY this Git repo via the API. It never holds fleet SSH and never
#     rolls a VM — so it cannot disrupt a running agent (incl. canary VM 1000).
#   * Clean merges open a PR that self-merges ONLY on green CI. The seam-guard CI
#     tests (venice/search providers, media-tool wiring, agent-elevation, the
#     webchat bake gate) are the living manifest of our customizations: if an
#     upstream change silently breaks a customized seam, CI fails -> auto-merge
#     is blocked -> the PR sits as a de-facto hold for a human to look at.
#   * Conflicts abort and open an `aeon-hold` issue. No partial/forced merges.
#
# ACTIVATION (Ash — Aeon stays INERT until you do these):
#   1. Add a repo secret `AEON_GITHUB_PAT` = a fine-grained PAT on this repo with
#      Contents:write + Pull-requests:write + Workflows:write. REQUIRED so the PR
#      Aeon opens actually triggers CI — PRs opened with the default GITHUB_TOKEN
#      do NOT trigger workflows, so auto-merge would wait forever without it.
#   2. Enable "Allow auto-merge" in repo Settings -> General (one-time).
#   3. Uncomment the `schedule:` block below to go from manual to every-3h.
# Until then it runs only when you trigger it from the Actions tab (great for
# watching the first few syncs before handing it the keys).

on:
  workflow_dispatch: {}
  # schedule:
  #   - cron: "17 */3 * * *"   # every 3h (offset to :17 to dodge top-of-hour CI congestion)

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: aeon-sync
  cancel-in-progress: false

env:
  UPSTREAM_URL: https://github.com/NousResearch/hermes-agent.git
  UPSTREAM_BRANCH: main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT so the opened PR triggers CI; falls back to GITHUB_TOKEN (PR opens
          # but CI won't run until the PAT is added — that's the activation signal).
          token: ${{ secrets.AEON_GITHUB_PAT || github.token }}

      - name: Configure git identity + merge drivers
        run: |
          git config user.name  "aeon-bot"
          git config user.email "aeon@hermesos.cloud"
          # REQUIRED: .gitattributes marks docker-publish.yml `merge=ours`. Without
          # this driver registered, that marker is a silent no-op and an upstream
          # change to the build workflow could clobber the fork-owned pipeline.
          git config merge.ours.driver true

      - name: Fetch upstream
        run: |
          git remote add upstream "$UPSTREAM_URL" 2>/dev/null \
            || git remote set-url upstream "$UPSTREAM_URL"
          git fetch --no-tags upstream "$UPSTREAM_BRANCH"

      - name: Anything to sync?
        id: delta
        run: |
          behind="$(git rev-list --count "HEAD..upstream/${UPSTREAM_BRANCH}")"
          up_sha="$(git rev-parse --short "upstream/${UPSTREAM_BRANCH}")"
          echo "behind=$behind" >> "$GITHUB_OUTPUT"
          echo "up_sha=$up_sha" >> "$GITHUB_OUTPUT"
          if [ "$behind" = "0" ]; then
            echo "Already current with upstream/${UPSTREAM_BRANCH} ($up_sha). Nothing to do."
          else
            echo "Behind upstream by $behind commit(s) (up to $up_sha)."
          fi

      - name: Attempt merge (merge, NOT rebase — preserve the merge-base)
        id: merge
        if: steps.delta.outputs.behind != '0'
        run: |
          branch="aeon/sync-$(date -u +%Y%m%d-%H%M)"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          git checkout -b "$branch"
          if git merge --no-edit "upstream/${UPSTREAM_BRANCH}"; then
            echo "clean=true" >> "$GITHUB_OUTPUT"
            echo "Clean merge of upstream/${UPSTREAM_BRANCH}."
          else
            echo "clean=false" >> "$GITHUB_OUTPUT"
            git diff --name-only --diff-filter=U > /tmp/aeon-conflicts.txt || true
            echo "Conflicts:"; cat /tmp/aeon-conflicts.txt
            git merge --abort
          fi

      - name: Clean merge → open PR + enable auto-merge
        if: steps.merge.outputs.clean == 'true'
        env:
          GH_TOKEN: ${{ secrets.AEON_GITHUB_PAT || github.token }}
        run: |
          branch="${{ steps.merge.outputs.branch }}"
          up_sha="${{ steps.delta.outputs.up_sha }}"
          behind="${{ steps.delta.outputs.behind }}"
          git push origin "$branch"
          body="Automated upstream sync to $up_sha — clean merge ($behind commit(s) behind). Auto-merges on green CI; the seam-guard tests gate it, so an upstream change that breaks a customized seam (per .hermesos/customizations.yaml) fails CI and holds this PR for a human. Merged with a merge commit (not squash) to preserve the upstream merge-base for future syncs."
          gh pr create --base main --head "$branch" --label aeon-sync --title "Aeon: upstream sync $up_sha" --body "$body"
          # --merge (not --squash): preserve upstream history / merge-base.
          gh pr merge "$branch" --merge --auto

      - name: Conflict → hold-and-alert (issue)
        if: steps.merge.outputs.clean == 'false'
        env:
          GH_TOKEN: ${{ secrets.AEON_GITHUB_PAT || github.token }}
        run: |
          up_sha="${{ steps.delta.outputs.up_sha }}"
          files="$(tr '\n' ' ' < /tmp/aeon-conflicts.txt)"
          body="Aeon could not cleanly merge upstream $up_sha into main. Conflicting files: $files. Resolve with the hermes-upstream-sync skill — check .hermesos/customizations.yaml for each file's policy (keep-ours / take-theirs / merge-careful) and re-run the named seam-guard tests. Once merged, Aeon resumes from the new HEAD on its next run. Aeon never force-merges a conflict."
          gh issue create --label aeon-hold --title "Aeon hold: upstream sync $up_sha needs a manual merge" --body "$body"
