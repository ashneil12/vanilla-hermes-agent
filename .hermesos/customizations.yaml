# HermesOS Customizations Manifest
# =================================
# The CONTRACT that governs autonomous upstream merges. The Aeon auto-update
# agent reads this BEFORE resolving any merge conflict against
# NousResearch/hermes-agent. It declares which changes are OURS (preserve),
# which always take upstream (re-forking them is a bug), and how to reconcile
# the few that overlap.
#
# FEEDBACK LOOP: whenever we add or change a HermesOS customization, we add or
# update its entry here in the SAME change. That is how the agent "stays aware"
# of our work on every future merge. An undeclared customization is one the
# auto-merge is allowed to clobber — so: no entry, no protection.
#
# Design principle: keep our changes ADDITIVE (new files beside upstream), not
# INVASIVE (edits inside upstream files). Additive changes never conflict, so
# the agent can merge unattended. Every "merge-careful" entry below is a place
# we failed that principle and must watch.

version: 1
forks:
  canary: ashneil12/vanilla-hermes-agent-canary      # bleeding edge
  prod:   ashneil12/vanilla-hermes-agent             # trails canary by 3h
upstream: NousResearch/hermes-agent

# on_conflict vocabulary
policies:
  keep-ours:     "Our version wins. Additive/standalone; upstream rarely touches it."
  take-theirs:   "Upstream wins. We do not customize this — keeping 'ours' is a bug."
  merge-careful: "Both sides changed. Reconcile semantically, re-run the named test(s), escalate if not confident."

# ---------------------------------------------------------------------------
# Things we OWN. Preserve across merges per on_conflict.
# ---------------------------------------------------------------------------
customizations:
  - id: webchat-web-shim
    status: live
    files:
      - path: apps/desktop/src/lib/web-shim.ts
        ownership: whole-file            # entirely ours
      - path: apps/desktop/src/main.tsx
        ownership: one-line              # only: `import './lib/web-shim'` at top
    intent: >
      Hosted-web bridge so the desktop renderer runs as a browser SPA against a
      remote gateway (provides window.hermesDesktop via fetch/WS instead of
      Electron IPC), plus the HermesOS "⊞ Dashboard" launcher button.
    on_conflict: keep-ours
    note: "If upstream reorders main.tsx imports, just keep our import line present."

  - id: webchat-image-serve
    status: live                   # baked into the agent image (pending canary-build verify)
    files:
      - path: hermes_cli/web_server.py
        ownership: block            # mount_webchat block inserted before mount_spa(app)
        on_conflict: merge-careful  # upstream owns this file's SPA serving; re-apply our /webchat mount
      - path: Dockerfile
        ownership: block            # apps/* manifest COPYs + the `vite build --base=/webchat/` step
        on_conflict: merge-careful
      - path: pyproject.toml
        ownership: one-line         # webchat_dist/**/* in package-data
        on_conflict: keep-ours
    intent: >
      Build the desktop renderer into hermes_cli/webchat_dist at image-build and
      serve it at /webchat from web_server.py (token + base-path injected like
      the dashboard SPA). Makes the rich chat durable + fleet-shipped, retiring
      the per-VM hand-deploy + Caddy guard.
    serves: "GET /webchat (+ /webchat/assets/*) from the baked-in bundle"
    follow_up: "Provisioner (Phase 2b): edge-route /webchat → dashboard:9119/webchat; then retire the per-instance webchat dir + route guard."

  - id: hermesos-brand-skin
    status: planned
    files: []                            # theme token overrides — filled in during port
    intent: "HermesOS gold/bronze skin + light preset for the web/desktop surfaces."
    on_conflict: keep-ours

  - id: health-egress
    status: ported            # agent plugin written; pending canary-build verification + cron repoint
    source_in_webui: "api/health_egress.py  (route: GET /api/health/egress)"
    ours_files:
      - plugins/hermes-egress/dashboard/plugin_api.py    # probe + router (whole file, ours)
      - plugins/hermes-egress/dashboard/manifest.json
    serves: "GET /api/plugins/hermes-egress/check?targets=...  (same wire shape as the webui original)"
    intent: >
      Synthetic outbound DNS/TCP egress probe. LOAD-BEARING: the Hermesdeploy
      fleet egress-sweep cron hits it on every VM to catch VMs that lost egress
      while /api/health stays green.
    on_conflict: keep-ours
    follow_up: >
      Control-plane PR: repoint dashboard/src/lib/instance-egress-sweep.ts from
      /api/health/egress to /api/plugins/hermes-egress/check and send the
      per-instance token. Verify the plugin mounts on a canary image build.

  - id: venice-managed-key-fallback
    status: resolved-no-code        # the agent handles this natively; NO code port, NO merge risk
    source_in_webui: "api/streaming.py :: _resolve_managed_venice_custom_api_key (a webui-only workaround)"
    finding: >
      The webui hook only existed because webui's generic `custom` resolver
      stamped a `no-key-required` placeholder and had no way to read a key from
      env at runtime. The UPSTREAM AGENT already supports this: a custom
      provider entry may declare `key_env` (or `api_key_env`) and the agent
      resolves the key from that env var at request time
      (agent/auxiliary_client.py:3582 `os.getenv(custom_key_env)`, and the main
      path at agent/agent_init.py:802). Native `provider: venice` reads
      VENICE_API_KEY directly. So both Venice access patterns work with config
      alone.
    resolution:
      native_venice: "provider: venice  → reads VENICE_API_KEY env (works as-is)"
      managed_custom_endpoint: "custom_providers entry with key_env: VENICE_API_KEY (or OPENAI_API_KEY) → agent reads injected env key at runtime"
    on_conflict: take-theirs        # we customize NOTHING here now; upstream owns key resolution
    provisioner_note: "When a managed-Venice custom OpenAI-compatible provider is configured, set key_env (not a literal key). No agent code, no streaming-layer patch."

  - id: aeon-delegation-panel
    status: planned
    source_in_webui: "api/aeon.py (writes skills.config.aeon_github_pat / aeon_fork_repo)"
    intent: "AEON GitHub-delegation settings UI. The `aeon` skill itself is upstream-compatible; only the settings panel is ours."
    on_conflict: keep-ours

  - id: first-run-onboarding
    status: planned
    source_in_webui: "api/bootstrap.py + a streaming hook"
    intent: "First-run identity-discovery prompt, once per newly provisioned agent."
    on_conflict: keep-ours

  - id: telemetry-deltas
    status: planned
    intent: >
      Surface day-of-week + hour-of-day activity heatmaps and cost/token
      share-% on the dashboard Analytics page, and default
      dashboard.show_token_analytics to true.
    on_conflict: merge-careful
    note: "Upstream InsightsEngine already computes activity patterns; we expose them. Re-check if upstream changes the analytics endpoint shape."

# ---------------------------------------------------------------------------
# We NEVER customize these. Take upstream, always. If a merge tries to keep
# 'ours' here, that is a regression to escalate — it means we accidentally
# re-forked something upstream now owns better than we do.
# ---------------------------------------------------------------------------
take_upstream_always:
  - chat, streaming, message rendering (assistant-ui)
  - sessions, persistence, resume
  - models, providers, profiles
  - cron, skills, MCP
  - i18n / locales
  - gateway + messaging platform adapters (Telegram/Discord/Slack/WhatsApp/Signal)
  - the dashboard web/ SPA and hermes_cli/web_server.py routes

# ---------------------------------------------------------------------------
# Autonomy guardrails for the Aeon agent.
# ---------------------------------------------------------------------------
autonomy:
  sync_interval: 3h
  prod_trails_canary: 3h
  rollout: pull-based            # VMs pull their image tag; Aeon never holds fleet SSH
  canary_tag: ":canary"
  prod_tag: ":stable"            # promote = re-tag the 3h-soaked canary digest
  on_ci_red: hold-and-alert      # never ship a red build
  on_low_confidence_merge: hold-and-alert
  per_vm_updater: "self health-check + auto-rollback to previous digest if unhealthy"
